<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Underwater Stamp</title>
  <style>
    :root{
      --text: rgba(240,250,255,.92);
      --muted: rgba(240,250,255,.62);
      --glass: rgba(10, 26, 45, .42);
      --glass2: rgba(10, 26, 45, .28);
      --border: rgba(180, 240, 255, .18);
      --accent: rgba(130, 220, 255, .95);
      --ok: rgba(100, 240, 180, .9);
      --danger: rgba(255, 130, 150, .9);
      --shadow: 0 18px 45px rgba(0,0,0,.35);
      --r: 18px;

      --btn-bg: rgba(20, 45, 70, .35);
      --btn-bd: rgba(180, 240, 255, .18);

      --focus: rgba(130,220,255,.55);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin:0;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Meiryo", Arial;
      overflow-x:hidden;

      /* Underwater background */
      background:
        radial-gradient(1100px 700px at 10% 10%, rgba(130,220,255,.22), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(100,240,180,.12), transparent 62%),
        radial-gradient(900px 600px at 70% 95%, rgba(70,140,255,.10), transparent 55%),
        linear-gradient(180deg, #061a2a 0%, #03121f 55%, #020a14 100%);
    }

    /* subtle caustics */
    .caustics{
      position: fixed;
      inset: -30%;
      pointer-events:none;
      opacity:.12;
      background:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,.85) 0 2px, transparent 3px),
        radial-gradient(circle at 30% 40%, rgba(255,255,255,.85) 0 2px, transparent 3px),
        radial-gradient(circle at 55% 30%, rgba(255,255,255,.85) 0 2px, transparent 3px),
        radial-gradient(circle at 75% 60%, rgba(255,255,255,.85) 0 2px, transparent 3px),
        radial-gradient(circle at 90% 35%, rgba(255,255,255,.85) 0 2px, transparent 3px);
      filter: blur(1px);
      animation: drift 14s ease-in-out infinite;
      transform: rotate(-7deg);
    }
    @keyframes drift{
      0%{ transform: translate3d(-1%, -1%, 0) rotate(-6deg) scale(1.02); }
      50%{ transform: translate3d(1.2%, 1%, 0) rotate(-8deg) scale(1.04); }
      100%{ transform: translate3d(-1%, -1%, 0) rotate(-6deg) scale(1.02); }
    }

    /* floating bubbles */
    .bubbles{ position:fixed; inset:0; pointer-events:none; opacity:.35; }
    .bubble{
      position:absolute;
      width: 10px; height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(200,250,255,.35);
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 55%);
      filter: blur(.2px);
      animation: rise linear infinite;
    }
    @keyframes rise{
      from{ transform: translateY(105vh) scale(.7); opacity:0; }
      10%{ opacity:.7; }
      to{ transform: translateY(-20vh) scale(1.05); opacity:0; }
    }

    /* Layout */
    .wrap{
      min-height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding: 26px 18px 28px;
      gap: 14px;
    }

    /* Top title (single element, not card) */
    .brand{
      width: min(1100px, 100%);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:12px;
      padding: 6px 2px 2px;
    }
    .brand .name{
      display:flex;
      align-items:center;
      gap:10px;
      letter-spacing:.2px;
      font-weight: 850;
      font-size: 18px;
      text-shadow: 0 8px 25px rgba(0,0,0,.35);
    }
    .brand .dot{
      width:10px; height:10px; border-radius:999px;
      background: var(--accent);
      box-shadow: 0 0 0 8px rgba(130,220,255,.12);
    }
    .brand .mini{
      color: var(--muted);
      font-size: 12px;
      text-align:right;
      line-height: 1.25;
      padding-bottom: 2px;
      user-select:none;
    }

    /* Floating standalone panel (for controls) */
    .panel{
      width:min(1100px, 100%);
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--glass), var(--glass2));
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 14px;
    }

    /* Home minimal */
    #home{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      flex-wrap:wrap;
    }

    /* Editor minimal toolbar */
    #editor{ display:none; }
    #editor.active{ display:block; }

    .toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      flex-wrap:wrap;
    }
    .left, .right{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    input[type="file"]{
      flex: 1;
      min-width: 240px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px dashed rgba(180,240,255,.26);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      outline:none;
    }
    input[type="file"]:focus{
      box-shadow: 0 0 0 4px rgba(130,220,255,.15);
      border-color: rgba(130,220,255,.40);
    }

    /* Buttons */
    .btn{
      position:relative;
      appearance:none;
      border: 1px solid var(--btn-bd);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
      color: var(--text);
      padding: 12px 14px;
      border-radius: 16px;
      cursor:pointer;
      font-weight: 800;
      letter-spacing:.2px;
      user-select:none;
      transition: transform .08s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease, filter .18s ease;
      overflow:hidden; /* for splash */
    }
    .btn:hover{
      border-color: rgba(130,220,255,.48);
      box-shadow: 0 0 0 4px rgba(130,220,255,.10), 0 18px 40px rgba(0,0,0,.25);
      filter: brightness(1.03);
    }
    .btn:active{ transform: translateY(1px) scale(.99); }
    .btn:focus-visible{
      outline:none;
      box-shadow: 0 0 0 5px rgba(130,220,255,.18);
      border-color: rgba(130,220,255,.55);
    }
    .btn.ok{
      border-color: rgba(100,240,180,.35);
    }
    .btn.ok:hover{
      border-color: rgba(100,240,180,.60);
      box-shadow: 0 0 0 4px rgba(100,240,180,.12), 0 18px 40px rgba(0,0,0,.25);
    }
    .btn.danger{
      border-color: rgba(255,130,150,.35);
    }
    .btn.danger:hover{
      border-color: rgba(255,130,150,.62);
      box-shadow: 0 0 0 4px rgba(255,130,150,.12), 0 18px 40px rgba(0,0,0,.25);
    }

    /* Splash droplets (created by JS) */
    .droplet{
      position:absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s);
      height: var(--s);
      border-radius: 999px;
      pointer-events:none;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,.90), rgba(255,255,255,.25) 35%, transparent 70%);
      border: 1px solid rgba(200,250,255,.28);
      transform: translate(-50%,-50%) scale(.5);
      opacity: .0;
      animation: splash 650ms ease-out forwards;
      filter: blur(.15px);
    }
    @keyframes splash{
      0%{ transform: translate(-50%,-50%) scale(.45); opacity:0; }
      15%{ opacity:.85; }
      100%{
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.05);
        opacity:0;
      }
    }

    .pill{
      color: var(--muted);
      font-size: 12px;
      padding: 10px 12px;
      border: 1px solid rgba(180,240,255,.16);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      user-select:none;
      white-space:nowrap;
    }

    /* Stage as standalone element (not inside card look) */
    .stageShell{
      width: min(1100px, 100%);
      border: 1px solid rgba(180,240,255,.16);
      border-radius: 20px;
      overflow:hidden;
      background: rgba(0,0,0,.28);
      box-shadow: 0 22px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    canvas{
      width: 100%;
      height: auto;
      display:block;
      touch-action:none;
    }

    /* Toast */
    .toast{
      position: fixed;
      left: 50%;
      top: 16px;
      transform: translateX(-50%);
      background: rgba(10, 26, 45, .72);
      border: 1px solid rgba(180,240,255,.18);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 999px;
      box-shadow: 0 18px 45px rgba(0,0,0,.35);
      font-size: 13px;
      display:none;
      max-width: min(92vw, 900px);
      z-index: 9999;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .toast.show{ display:block; }

    /* tiny footer spacer */
    .spacer{ height: 10px; }

    @media (max-width: 520px){
      .brand .mini{ display:none; }
      .btn{ width: 100%; }
      #home{ gap: 12px; }
      input[type="file"]{ min-width: 100%; }
      .left, .right{ width:100%; }
      .right .btn{ width: 100%; }
    }
  </style>
</head>

<body>
  <div class="caustics"></div>
  <div class="bubbles" id="bubbles"></div>

  <div class="wrap">
    <div class="brand">
      <div class="name"><span class="dot"></span>Underwater Stamp</div>
      <div class="mini">1600×900 / long-press</div>
    </div>

    <!-- HOME (minimal, standalone panel) -->
    <section id="home" class="panel">
      <input id="fileInput" type="file" accept="image/*" />
      <button id="downloadWakuBtn" class="btn ok">waku1</button>
      <span class="pill">長押しでスタンプ</span>
    </section>

    <!-- EDITOR (controls as standalone panel) -->
    <section id="editor">
      <div class="panel toolbar">
        <div class="left">
          <button id="backBtn" class="btn">戻る</button>
          <button id="resetBtn" class="btn danger">リセット</button>
          <span id="badge" class="pill">長押し</span>
        </div>
        <div class="right">
          <button id="downloadBtn" class="btn ok">ダウンロード</button>
        </div>
      </div>

      <div class="stageShell">
        <canvas id="stage" width="1600" height="900"></canvas>
      </div>
    </section>

    <div class="spacer"></div>
  </div>

  <div id="toast" class="toast"></div>

<script>
(() => {
  // ====== スタンプサイズ（px / 1600x900基準） ======
  const STAMP_SIZE_PX = 160;   // ←ここで変更
  // ====== 長押し時間 ======
  const HOLD_MS = 3000;

  // 画像名フォールバック
  const WAKU_CANDIDATES = ["waku1.PNG","waku1.png","WAKU1.PNG","WAKU1.png"];
  const SUTA_CANDIDATES = ["suta.PNG","suta.png","SUTA.PNG","SUTA.png"];

  const home = document.getElementById("home");
  const editor = document.getElementById("editor");

  const fileInput = document.getElementById("fileInput");
  const downloadWakuBtn = document.getElementById("downloadWakuBtn");

  const backBtn = document.getElementById("backBtn");
  const resetBtn = document.getElementById("resetBtn");
  const downloadBtn = document.getElementById("downloadBtn");
  const badge = document.getElementById("badge");

  const canvas = document.getElementById("stage");
  const ctx = canvas.getContext("2d", { alpha: true });

  const toast = document.getElementById("toast");

  // state
  let wakuImg = null;
  let sutaImg = null;
  let baseImg = null;      // user image (1600x900)
  let stamps = [];         // {x,y,size}

  // hold visual
  let holding = false;
  let holdStart = 0;
  let holdX = 0, holdY = 0;
  let holdCommitted = false;

  function showToast(msg, ms=2200){
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toast.classList.remove("show"), ms);
  }

  function setView(which){
    if(which === "home"){
      home.style.display = "flex";
      editor.classList.remove("active");
    }else{
      home.style.display = "none";
      editor.classList.add("active");
    }
  }

  function loadFirstExisting(candidates){
    return new Promise((resolve, reject) => {
      let i = 0;
      const tryNext = () => {
        if(i >= candidates.length) return reject(new Error("not found"));
        const src = candidates[i++];
        const img = new Image();
        img.onload = () => resolve({img, src});
        img.onerror = () => tryNext();
        img.src = src + "?v=" + Date.now();
      };
      tryNext();
    });
  }

  async function initAssets(){
    try{ wakuImg = (await loadFirstExisting(WAKU_CANDIDATES)).img; }
    catch{ showToast("waku1.PNG が見つからない"); }

    try{ sutaImg = (await loadFirstExisting(SUTA_CANDIDATES)).img; }
    catch{ showToast("suta.PNG が見つからない"); }
  }

  function downloadBlob(blob, filename){
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1500);
  }

  // ========== しぶき（ボタン hover） ==========
  function splash(btn, x, y){
    // x,y: button local coords
    const rect = btn.getBoundingClientRect();
    const rx = x / rect.width;
    const ry = y / rect.height;

    const count = 10 + Math.floor(Math.random() * 6);
    for(let i=0;i<count;i++){
      const d = document.createElement("span");
      d.className = "droplet";
      const size = (6 + Math.random()*10).toFixed(1) + "px";

      const angle = Math.random()*Math.PI*2;
      const dist = 18 + Math.random()*38;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;

      d.style.setProperty("--x", (rx*100).toFixed(2) + "%");
      d.style.setProperty("--y", (ry*100).toFixed(2) + "%");
      d.style.setProperty("--s", size);
      d.style.setProperty("--dx", dx.toFixed(1) + "px");
      d.style.setProperty("--dy", dy.toFixed(1) + "px");
      btn.appendChild(d);

      d.addEventListener("animationend", () => d.remove(), { once:true });
    }
  }

  function bindSplashToButtons(){
    const btns = document.querySelectorAll(".btn");
    btns.forEach(btn => {
      let last = 0;
      btn.addEventListener("pointermove", (e) => {
        // hover中に過剰発生しないように軽く間引き
        const now = performance.now();
        if(now - last < 120) return;
        last = now;
        const r = btn.getBoundingClientRect();
        splash(btn, e.clientX - r.left, e.clientY - r.top);
      });
      btn.addEventListener("pointerenter", (e) => {
        const r = btn.getBoundingClientRect();
        splash(btn, e.clientX - r.left, e.clientY - r.top);
      });
    });
  }

  // ========== 背景の泡 ==========
  function initBubbles(){
    const box = document.getElementById("bubbles");
    const n = 18;
    for(let i=0;i<n;i++){
      const b = document.createElement("div");
      b.className = "bubble";
      const left = Math.random()*100;
      const size = 6 + Math.random()*16;
      const dur = 10 + Math.random()*14;
      const delay = -Math.random()*dur;
      b.style.left = left.toFixed(2) + "vw";
      b.style.width = size.toFixed(1) + "px";
      b.style.height = size.toFixed(1) + "px";
      b.style.animationDuration = dur.toFixed(2) + "s";
      b.style.animationDelay = delay.toFixed(2) + "s";
      b.style.opacity = (0.18 + Math.random()*0.35).toFixed(2);
      box.appendChild(b);
    }
  }

  // ===== draw =====
  // 重要：円とスタンプが見えない問題を避けるため
  //      「wakuを最下層」「リングを最上層」にしています。
  function draw(now){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // ① waku を下（背景）
    if(wakuImg){
      ctx.drawImage(wakuImg, 0,0, canvas.width, canvas.height);
    }else{
      ctx.fillStyle = "rgba(0,0,0,.35)";
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    // ② ユーザー画像
    if(baseImg){
      ctx.drawImage(baseImg, 0,0, canvas.width, canvas.height);
    }

    // ③ スタンプ
    if(sutaImg){
      for(const st of stamps){
        const sz = st.size;
        ctx.drawImage(sutaImg, st.x - sz/2, st.y - sz/2, sz, sz);
      }
    }

    // ④ 長押しリング（最上層）
    if(holding){
      const t = Math.max(0, Math.min(1, (now - holdStart) / HOLD_MS));
      const r = 54;

      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.lineWidth = 12;
      ctx.lineCap = "round";

      ctx.strokeStyle = "rgba(240,250,255,.28)";
      ctx.beginPath();
      ctx.arc(holdX, holdY, r, 0, Math.PI*2);
      ctx.stroke();

      ctx.strokeStyle = "rgba(130,220,255,.98)";
      ctx.beginPath();
      ctx.arc(holdX, holdY, r, -Math.PI/2, -Math.PI/2 + (Math.PI*2)*t);
      ctx.stroke();

      ctx.fillStyle = "rgba(240,250,255,.95)";
      ctx.beginPath();
      ctx.arc(holdX, holdY, 5, 0, Math.PI*2);
      ctx.fill();

      ctx.restore();

      if(t >= 1 && !holdCommitted){
        holdCommitted = true;
        stamps.push({x: holdX, y: holdY, size: STAMP_SIZE_PX});
        showToast("スタンプOK");
      }
    }
  }

  function loop(now){
    draw(now);
    requestAnimationFrame(loop);
  }

  // ===== pointer =====
  function getCanvasPoint(e){
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width;
    const sy = canvas.height / rect.height;
    return {
      x: (e.clientX - rect.left) * sx,
      y: (e.clientY - rect.top) * sy
    };
  }

  function cancelHold(){
    holding = false;
    holdStart = 0;
    holdCommitted = false;
  }

  canvas.addEventListener("pointerdown", (e) => {
    if(!baseImg){ showToast("画像を選んで"); return; }
    if(!sutaImg){ showToast("suta.PNG がない"); return; }

    const p = getCanvasPoint(e);
    holding = true;
    holdCommitted = false;
    holdStart = performance.now();
    holdX = p.x; holdY = p.y;

    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener("pointermove", (e) => {
    if(!holding) return;
    const p = getCanvasPoint(e);
    holdX = p.x; holdY = p.y;
  });

  const end = () => { if(holding) cancelHold(); };
  canvas.addEventListener("pointerup", end);
  canvas.addEventListener("pointercancel", end);

  // ===== UI events =====
  fileInput.addEventListener("change", () => {
    const file = fileInput.files?.[0];
    if(!file) return;

    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const w = img.naturalWidth, h = img.naturalHeight;
      if(w === 1600 && h === 900){
        baseImg = img;
        stamps = [];
        cancelHold();
        setView("editor");
        showToast("OK");
      }else{
        showToast("1600×900のみ");
        URL.revokeObjectURL(url);
        fileInput.value = "";
      }
    };
    img.onerror = () => {
      showToast("読み込み失敗");
      URL.revokeObjectURL(url);
      fileInput.value = "";
    };
    img.src = url;
  });

  downloadWakuBtn.addEventListener("click", () => {
    (async () => {
      for(const name of WAKU_CANDIDATES){
        try{
          const r = await fetch(name, {cache:"no-store"});
          if(!r.ok) continue;
          downloadBlob(await r.blob(), "waku1.png");
          return;
        }catch{}
      }
      showToast("waku1 がない");
    })();
  });

  backBtn.addEventListener("click", () => {
    baseImg = null;
    stamps = [];
    cancelHold();
    fileInput.value = "";
    setView("home");
  });

  resetBtn.addEventListener("click", () => {
    stamps = [];
    cancelHold();
    showToast("リセット");
  });

  downloadBtn.addEventListener("click", () => {
    if(!baseImg){ showToast("画像がない"); return; }
    canvas.toBlob((blob) => {
      if(!blob){ showToast("保存失敗"); return; }
      downloadBlob(blob, "stamped.png");
    }, "image/png");
  });

  // ===== start =====
  (async () => {
    initBubbles();
    await initAssets();
    setView("home");
    bindSplashToButtons();
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
