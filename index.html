<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>プランク集会</title>

  <!-- タイトル用フォント（読めなければ自動で通常フォントにフォールバック） -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bgTop:#0b5aa8;
      --bgMid:#0a88c9;
      --bgBottom:#0b2a6d;

      --text: rgba(245,253,255,.96);
      --muted: rgba(245,253,255,.72);

      --border: rgba(255,255,255,.16);
      --shadow: 0 24px 70px rgba(0,0,0,.32);

      --hint: rgba(170,150,255,.98);
      --upload: rgba(120, 220, 255, .98);
      --dl: rgba(100, 240, 180, .98);
      --danger: rgba(255, 130, 150, .98);
    }

    *{ box-sizing:border-box; }
    html, body{ height:100%; }
    body{
      margin:0;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Meiryo", Arial;
      overflow:hidden;
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(255,255,255,.22), transparent 55%),
        radial-gradient(900px 600px at 85% 15%, rgba(255,255,255,.12), transparent 60%),
        linear-gradient(180deg, var(--bgTop) 0%, var(--bgMid) 45%, var(--bgBottom) 100%);
    }

    /* soft rays */
    .rays{
      position: fixed;
      inset:-20%;
      pointer-events:none;
      opacity:.22;
      background:
        linear-gradient(105deg, transparent 0 20%, rgba(255,255,255,.25) 28%, transparent 36%),
        linear-gradient(78deg, transparent 0 30%, rgba(255,255,255,.18) 40%, transparent 50%),
        linear-gradient(120deg, transparent 0 35%, rgba(255,255,255,.12) 46%, transparent 57%);
      filter: blur(2px);
      transform: rotate(-6deg);
      animation: rayMove 12s ease-in-out infinite;
    }
    @keyframes rayMove{
      0%{ transform: translate3d(-1%, -1%, 0) rotate(-6deg) scale(1.02); }
      50%{ transform: translate3d(1.2%, 1%, 0) rotate(-8deg) scale(1.03); }
      100%{ transform: translate3d(-1%, -1%, 0) rotate(-6deg) scale(1.02); }
    }

    /* bubbles */
    .bubbles{ position:fixed; inset:0; pointer-events:none; opacity:.25; }
    .bubble{
      position:absolute;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.28);
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.30), transparent 60%);
      filter: blur(.25px);
      animation: rise linear infinite;
    }
    @keyframes rise{
      from{ transform: translateY(110vh) scale(.7); opacity:0; }
      12%{ opacity:.75; }
      to{ transform: translateY(-20vh) scale(1.12); opacity:0; }
    }

    /* fish silhouettes */
    .fishLane{
      position: fixed;
      inset: 0;
      pointer-events:none;
      overflow:hidden;
    }
    .fish{
      position:absolute;
      width: 220px;
      height: 90px;
      opacity: .0;
      filter: blur(10px);
      transform: translate3d(-30vw, 0, 0) scale(.55);
      animation: swim 14s linear infinite;
      will-change: transform, opacity, filter;
    }
    .fish svg{ width:100%; height:100%; display:block; fill: rgba(255,255,255,.22); }
    .fish.f1{ top: 18%; animation-delay: -2s;  animation-duration: 16s; }
    .fish.f2{ top: 52%; animation-delay: -7s;  animation-duration: 18s; }
    .fish.f3{ top: 74%; animation-delay: -11s; animation-duration: 20s; }
    @keyframes swim{
      0%{ opacity:0; filter: blur(12px); transform: translate3d(-35vw, 0, 0) scale(.55); }
      10%{ opacity:.10; }
      35%{ opacity:.18; filter: blur(9px);  transform: translate3d(15vw, 0, 0) scale(.80); }
      55%{ opacity:.22; filter: blur(7px);  transform: translate3d(45vw, 0, 0) scale(1.05); }
      70%{ opacity:.16; filter: blur(10px); transform: translate3d(70vw, 0, 0) scale(.92); }
      100%{ opacity:0; filter: blur(14px); transform: translate3d(120vw, 0, 0) scale(.62); }
    }

    .screen{ position: relative; width:100%; height:100%; }

    /* Title */
    .brand{
      position:absolute;
      top: 26px;
      left: 50%;
      transform: translateX(-50%);
      font-family: "Kaisei Decol", "Noto Sans JP", ui-sans-serif, system-ui;
      font-weight: 700;
      font-size: clamp(26px, 3.4vw, 40px);
      letter-spacing: .06em;
      text-shadow: 0 18px 50px rgba(0,0,0,.35);
      user-select:none;
      white-space:nowrap;
    }

    /* Dock (bottom-left) */
    .dock{
      position:absolute;
      left: 22px;
      bottom: 22px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      align-items:stretch;
      width: min(360px, calc(100vw - 44px));
    }

    .btn{
      appearance:none;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      color: var(--text);
      border-radius: 22px;
      cursor:pointer;
      font-weight: 900;
      box-shadow: var(--shadow);
      transition: transform .08s ease, filter .18s ease, box-shadow .18s ease, border-color .18s ease;
      position:relative;
      overflow:hidden;
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      font-size: 18px;
    }
    .btn:active{ transform: translateY(1px) scale(.99); }
    .btn:hover{ filter: brightness(1.04); }

    .btn.hint{
      padding: 18px 18px;
      border-color: rgba(170,150,255,.55);
      background: linear-gradient(180deg, rgba(170,150,255,.22), rgba(255,255,255,.05));
    }
    .btn.upload{
      border-color: rgba(120,220,255,.55);
      background: linear-gradient(180deg, rgba(120,220,255,.22), rgba(255,255,255,.05));
      padding: 0; /* split manages padding */
    }

    /* Upload split */
    .split{
      display:flex;
      width:100%;
      align-items:stretch;
      justify-content:space-between;
      overflow:hidden;
      border-radius: 22px;
    }
    .splitMain{
      flex: 1 1 auto;
      padding: 18px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      cursor:pointer;
    }
    .splitMini{
      flex: 0 0 auto;
      min-width: 72px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-left: 1px solid rgba(255,255,255,.14);
      background: rgba(100,240,180,.12);
      color: rgba(240,255,250,.95);
      font-weight: 950;
      cursor:pointer;
      padding: 18px 14px;
      user-select:none;
    }
    .splitMini:hover{ background: rgba(100,240,180,.18); }

    .icon{ opacity:.95; font-size: 20px; }
    .label{ display:flex; align-items:center; gap:10px; min-width:0; }
    .labelText{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* Splash */
    .droplet{
      position:absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s);
      height: var(--s);
      border-radius: 999px;
      pointer-events:none;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.90), rgba(255,255,255,.25) 35%, transparent 70%);
      border: 1px solid rgba(255,255,255,.22);
      transform: translate(-50%,-50%) scale(.5);
      opacity: .0;
      animation: splash 650ms ease-out forwards;
      filter: blur(.15px);
    }
    @keyframes splash{
      0%{ transform: translate(-50%,-50%) scale(.45); opacity:0; }
      15%{ opacity:.85; }
      100%{
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.05);
        opacity:0;
      }
    }

    /* LIST */
    .topRight{
      position:absolute;
      top: 18px;
      right: 18px;
      display:flex;
      gap: 10px;
      align-items:center;

      z-index: 60;          /* ← FIX: buttons on top */
      pointer-events: auto; /* ← FIX */
      touch-action: manipulation;
    }
    .smallBtn{
      appearance:none;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      color: var(--text);
      border-radius: 16px;
      padding: 12px 14px;
      cursor:pointer;
      font-weight: 950;
      box-shadow: 0 18px 45px rgba(0,0,0,.22);
      transition: transform .08s ease, filter .18s ease, background .18s ease;
      position:relative;
      overflow:hidden;
      user-select:none;
      font-size: 16px;
      white-space:nowrap;
    }
    .smallBtn:active{ transform: translateY(1px); }
    .smallBtn:hover{ filter: brightness(1.04); }
    .smallBtn.shuffle{
      border-color: rgba(120,220,255,.45);
      background: rgba(120,220,255,.14);
    }

    .center{
      position:absolute;
      inset: 0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 24px;

      pointer-events: none; /* ← FIX: center doesn't block topRight */
    }
    .hintBox{
      width: min(980px, 100%);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,.16);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(0,20,60,.20));
      box-shadow: 0 28px 80px rgba(0,0,0,.30);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 28px 24px;
      text-align:center;

      pointer-events: auto; /* ← FIX: box itself can be interacted with */
    }
    .hintCat{
      font-weight: 900;
      color: rgba(245,253,255,.75);
      font-size: 16px;
      letter-spacing:.06em;
      margin-bottom: 12px;
      user-select:none;
    }
    .hintText{
      font-weight: 980;
      font-size: clamp(34px, 4.2vw, 62px);
      letter-spacing:.02em;
      line-height: 1.12;
      user-select:none;
      word-break: keep-all;
    }

    /* EDITOR minimal */
    .editorTop{
      position:absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      display:flex;
      justify-content:space-between;
      gap: 10px;
      flex-wrap:wrap;
      align-items:center;
      z-index: 30;
      pointer-events:auto;
    }
    .editorBtns{ display:flex; gap: 10px; flex-wrap:wrap; align-items:center; }

    .actBtn{
      appearance:none;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      color: var(--text);
      border-radius: 16px;
      padding: 12px 14px;
      cursor:pointer;
      font-weight: 950;
      box-shadow: 0 18px 45px rgba(0,0,0,.22);
      position:relative;
      overflow:hidden;
      user-select:none;
      font-size: 16px;
      white-space:nowrap;
      transition: filter .18s ease, transform .08s ease, background .18s ease, border-color .18s ease;
      touch-action: manipulation;
    }
    .actBtn:active{ transform: translateY(1px); }
    .actBtn:hover{ filter: brightness(1.04); }
    .actBtn.save{ border-color: rgba(100,240,180,.50); background: rgba(100,240,180,.14); }
    .actBtn.reset{ border-color: rgba(255,130,150,.50); background: rgba(255,130,150,.14); }

    .canvasWrap{
      position:absolute;
      left: 18px;
      right: 18px;
      top: 76px;
      bottom: 18px;
      border-radius: 22px;
      overflow:hidden;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.22);
      box-shadow: 0 28px 80px rgba(0,0,0,.30);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);

      /* ← FIX: canvas centered and scaled to fit without clipping */
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 0;
    }
    canvas{
      display:block;
      /* fit inside canvasWrap */
      width: auto;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      touch-action:none;
    }

    /* toast */
    .toast{
      position: fixed;
      left: 50%;
      top: 16px;
      transform: translateX(-50%);
      background: rgba(0,20,60,.60);
      border: 1px solid rgba(255,255,255,.14);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 999px;
      box-shadow: 0 18px 45px rgba(0,0,0,.30);
      font-size: 13px;
      display:none;
      z-index: 9999;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      user-select:none;
      max-width: min(92vw, 900px);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .toast.show{ display:block; }

    #fileInput{ display:none; }
  </style>
</head>

<body>
  <div class="rays"></div>
  <div class="bubbles" id="bubbles"></div>

  <div class="fishLane" aria-hidden="true">
    <div class="fish f1">
      <svg viewBox="0 0 240 100">
        <path d="M10,50 C35,20 75,15 110,30 C130,10 160,10 175,28 C205,40 220,55 230,50 C220,65 205,78 175,72 C160,90 130,90 110,70 C75,85 35,80 10,50 Z"/>
        <path d="M210,50 L238,30 L232,50 L238,70 Z"/>
      </svg>
    </div>
    <div class="fish f2">
      <svg viewBox="0 0 240 100">
        <path d="M14,50 C40,22 82,18 116,33 C138,12 164,12 180,30 C210,42 225,58 234,50 C225,66 210,80 180,74 C164,92 138,92 116,70 C82,86 40,82 14,50 Z"/>
        <path d="M214,50 L238,28 L232,50 L238,72 Z"/>
      </svg>
    </div>
    <div class="fish f3">
      <svg viewBox="0 0 240 100">
        <path d="M12,50 C38,24 80,18 114,34 C136,14 162,14 178,32 C208,44 223,58 232,50 C223,66 208,78 178,74 C162,90 136,90 114,68 C80,84 38,78 12,50 Z"/>
        <path d="M212,50 L238,30 L232,50 L238,70 Z"/>
      </svg>
    </div>
  </div>

  <!-- HOME -->
  <div id="home" class="screen">
    <div class="brand">プランク集会</div>

    <div class="dock">
      <button id="openListBtn" class="btn hint">
        <span class="label">
          <span class="icon">１</span>
          <span class="labelText">整いヒント</span>
        </span>
        <span class="icon">→</span>
      </button>

      <button id="uploadGroupBtn" class="btn upload" aria-label="読み込み / waku1 DL">
        <div class="split">
          <div class="splitMain" id="uploadBtn" role="button" aria-label="読み込み">
            <span class="label">
              <span class="icon">２</span>
              <span class="labelText">カードを選択</span>
            </span>
            <span class="icon">→</span>
          </div>
          <div class="splitMini" id="downloadWakuBtn" role="button" aria-label="waku1 DL">カードDL</div>
        </div>
      </button>

      <input id="fileInput" type="file" accept="image/*" />
    </div>
  </div>

  <!-- LIST -->
  <div id="list" class="screen" style="display:none;">
    <div class="topRight">
      <button id="listBackBtn" class="smallBtn back">戻る</button>
      <button id="shuffleBtn" class="smallBtn shuffle">シャッフル</button>
    </div>

    <div class="center">
      <div class="hintBox">
        <div class="hintCat" id="hintCat">—</div>
        <div class="hintText" id="hintText">—</div>
      </div>
    </div>
  </div>

  <!-- EDITOR -->
  <div id="editor" class="screen" style="display:none;">
    <div class="editorTop">
      <div class="editorBtns">
        <button id="backBtn" class="actBtn">戻る</button>
        <button id="resetBtn" class="actBtn reset">リセット</button>
      </div>
      <div class="editorBtns">
        <button id="downloadBtn" class="actBtn save">保存</button>
      </div>
    </div>

    <div class="canvasWrap">
      <canvas id="stage" width="1600" height="900"></canvas>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>
(() => {
  const STAMP_SIZE_PX = 180;
  const HOLD_MS = 3000;

  const WAKU_CANDIDATES = ["waku1.PNG","waku1.png","WAKU1.PNG","WAKU1.png"];
  const SUTA_CANDIDATES = ["suta.PNG","suta.png","SUTA.PNG","SUTA.png"];

  const HINTS = [
    { cat:"🌙 今日", text:"ゴミ1つ捨てる" },
    { cat:"🌙 今日", text:"靴をそろえる" },
    { cat:"🌙 今日", text:"鍵を戻す" },
    { cat:"🌙 今日", text:"通知オフ" },
    { cat:"🌤 明日", text:"服を出す" },
    { cat:"🌤 明日", text:"予定を見る" },
    { cat:"🌤 明日", text:"アラーム設定" },
    { cat:"🌤 明日", text:"天気を見る" },
    { cat:"⏱ 10分", text:"床コロコロ" },
    { cat:"⏱ 10分", text:"洗面台ふく" },
    { cat:"⏱ 10分", text:"洗い物終える" },
    { cat:"⏱ 10分", text:"不要3つ捨て" },
  ];

  const toast = document.getElementById("toast");

  const home = document.getElementById("home");
  const list = document.getElementById("list");
  const editor = document.getElementById("editor");

  const openListBtn = document.getElementById("openListBtn");
  const uploadBtn = document.getElementById("uploadBtn");
  const downloadWakuBtn = document.getElementById("downloadWakuBtn");
  const fileInput = document.getElementById("fileInput");

  const listBackBtn = document.getElementById("listBackBtn");
  const shuffleBtn = document.getElementById("shuffleBtn");
  const hintCat = document.getElementById("hintCat");
  const hintText = document.getElementById("hintText");

  const backBtn = document.getElementById("backBtn");
  const resetBtn = document.getElementById("resetBtn");
  const downloadBtn = document.getElementById("downloadBtn");

  const canvas = document.getElementById("stage");
  const ctx = canvas.getContext("2d", { alpha: true });

  let wakuImg = null;
  let sutaImg = null;
  let baseImg = null;
  let stamps = [];

  let holding = false;
  let holdStart = 0;
  let holdX = 0, holdY = 0;
  let holdCommitted = false;

  function showToast(msg, ms=1400){
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toast.classList.remove("show"), ms);
  }

  function setScreen(which){
    home.style.display = (which === "home") ? "block" : "none";
    list.style.display = (which === "list") ? "block" : "none";
    editor.style.display = (which === "editor") ? "block" : "none";
  }

  function loadFirstExisting(candidates){
    return new Promise((resolve, reject) => {
      let i = 0;
      const tryNext = () => {
        if(i >= candidates.length) return reject(new Error("not found"));
        const src = candidates[i++];
        const img = new Image();
        img.onload = () => resolve({img, src});
        img.onerror = () => tryNext();
        img.src = src + "?v=" + Date.now();
      };
      tryNext();
    });
  }

  async function initAssets(){
    try{ wakuImg = (await loadFirstExisting(WAKU_CANDIDATES)).img; }
    catch{ showToast("waku1なし"); }
    try{ sutaImg = (await loadFirstExisting(SUTA_CANDIDATES)).img; }
    catch{ showToast("sutaなし"); }
  }

  function downloadBlob(blob, filename){
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1500);
  }

  function splash(el, clientX, clientY){
    const rect = el.getBoundingClientRect();
    const x = (clientX - rect.left) / rect.width;
    const y = (clientY - rect.top) / rect.height;
    const count = 8 + Math.floor(Math.random() * 5);
    for(let i=0;i<count;i++){
      const d = document.createElement("span");
      d.className = "droplet";
      const size = (6 + Math.random()*10).toFixed(1) + "px";
      const angle = Math.random()*Math.PI*2;
      const dist = 14 + Math.random()*34;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;

      d.style.setProperty("--x", (x*100).toFixed(2) + "%");
      d.style.setProperty("--y", (y*100).toFixed(2) + "%");
      d.style.setProperty("--s", size);
      d.style.setProperty("--dx", dx.toFixed(1) + "px");
      d.style.setProperty("--dy", dy.toFixed(1) + "px");
      el.appendChild(d);
      d.addEventListener("animationend", () => d.remove(), { once:true });
    }
  }

  function bindSplash(el){
    let last = 0;
    el.addEventListener("pointerenter", (e) => splash(el, e.clientX, e.clientY));
    el.addEventListener("pointermove", (e) => {
      const now = performance.now();
      if(now - last < 160) return;
      last = now;
      splash(el, e.clientX, e.clientY);
    });
  }

  function initBubbles(){
    const box = document.getElementById("bubbles");
    const n = 16;
    for(let i=0;i<n;i++){
      const b = document.createElement("div");
      b.className = "bubble";
      const left = Math.random()*100;
      const size = 6 + Math.random()*16;
      const dur = 11 + Math.random()*14;
      const delay = -Math.random()*dur;
      b.style.left = left.toFixed(2) + "vw";
      b.style.width = size.toFixed(1) + "px";
      b.style.height = size.toFixed(1) + "px";
      b.style.animationDuration = dur.toFixed(2) + "s";
      b.style.animationDelay = delay.toFixed(2) + "s";
      b.style.opacity = (0.14 + Math.random()*0.26).toFixed(2);
      box.appendChild(b);
    }
  }

  function draw(now){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // 1) waku
    if(wakuImg){
      ctx.drawImage(wakuImg, 0,0, canvas.width, canvas.height);
    }else{
      ctx.fillStyle = "rgba(0,0,0,.25)";
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    // 2) user image
    if(baseImg){
      ctx.drawImage(baseImg, 0,0, canvas.width, canvas.height);
    }

    // 3) stamps
    if(sutaImg){
      for(const st of stamps){
        const sz = st.size;
        ctx.drawImage(sutaImg, st.x - sz/2, st.y - sz/2, sz, sz);
      }
    }

    // 4) ring
    if(holding){
      const t = Math.max(0, Math.min(1, (now - holdStart) / HOLD_MS));
      const r = 54;

      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.lineWidth = 12;
      ctx.lineCap = "round";

      ctx.strokeStyle = "rgba(245,253,255,.25)";
      ctx.beginPath();
      ctx.arc(holdX, holdY, r, 0, Math.PI*2);
      ctx.stroke();

      ctx.strokeStyle = "rgba(120,220,255,.98)";
      ctx.beginPath();
      ctx.arc(holdX, holdY, r, -Math.PI/2, -Math.PI/2 + (Math.PI*2)*t);
      ctx.stroke();

      ctx.fillStyle = "rgba(245,253,255,.95)";
      ctx.beginPath();
      ctx.arc(holdX, holdY, 5, 0, Math.PI*2);
      ctx.fill();

      ctx.restore();

      if(t >= 1 && !holdCommitted){
        holdCommitted = true;
        stamps.push({x: holdX, y: holdY, size: STAMP_SIZE_PX});
        showToast("OK");
      }
    }
  }

  function loop(now){
    draw(now);
    requestAnimationFrame(loop);
  }

  function getCanvasPoint(e){
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width;
    const sy = canvas.height / rect.height;
    return { x:(e.clientX-rect.left)*sx, y:(e.clientY-rect.top)*sy };
  }
  function cancelHold(){
    holding=false; holdStart=0; holdCommitted=false;
  }

  canvas.addEventListener("pointerdown", (e) => {
    if(!baseImg){ showToast("画像なし"); return; }
    if(!sutaImg){ showToast("sutaなし"); return; }
    const p = getCanvasPoint(e);
    holding = true;
    holdCommitted = false;
    holdStart = performance.now();
    holdX = p.x; holdY = p.y;
    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener("pointermove", (e) => {
    if(!holding) return;
    const p = getCanvasPoint(e);
    holdX = p.x; holdY = p.y;
  });

  const end = () => { if(holding) cancelHold(); };
  canvas.addEventListener("pointerup", end);
  canvas.addEventListener("pointercancel", end);

  function pickHint(){
    const i = Math.floor(Math.random() * HINTS.length);
    const h = HINTS[i];
    hintCat.textContent = h.cat;
    hintText.textContent = h.text;
  }

  // HOME
  openListBtn.addEventListener("click", () => {
    pickHint();
    setScreen("list");
  });

  uploadBtn.addEventListener("click", () => fileInput.click());

  downloadWakuBtn.addEventListener("click", async (e) => {
    e.stopPropagation();
    for(const name of WAKU_CANDIDATES){
      try{
        const r = await fetch(name, {cache:"no-store"});
        if(!r.ok) continue;
        downloadBlob(await r.blob(), "waku1.png");
        return;
      }catch{}
    }
    showToast("waku1なし");
  });

  fileInput.addEventListener("change", () => {
    const file = fileInput.files?.[0];
    if(!file) return;

    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const w = img.naturalWidth, h = img.naturalHeight;
      if(w === 1600 && h === 900){
        baseImg = img;
        stamps = [];
        cancelHold();
        setScreen("editor");
        showToast("OK");
      }else{
        showToast("1600×900のみ");
        URL.revokeObjectURL(url);
        fileInput.value = "";
      }
    };
    img.onerror = () => {
      showToast("失敗");
      URL.revokeObjectURL(url);
      fileInput.value = "";
    };
    img.src = url;
  });

  // LIST
  listBackBtn.addEventListener("click", () => setScreen("home"));
  shuffleBtn.addEventListener("click", () => pickHint());

  // EDITOR
  backBtn.addEventListener("click", () => {
    baseImg = null;
    stamps = [];
    cancelHold();
    fileInput.value = "";
    setScreen("home");
  });

  resetBtn.addEventListener("click", () => {
    stamps = [];
    cancelHold();
    showToast("消去");
  });

  downloadBtn.addEventListener("click", () => {
    if(!baseImg){ showToast("画像なし"); return; }
    canvas.toBlob((blob) => {
      if(!blob){ showToast("失敗"); return; }
      downloadBlob(blob, "stamped.png");
    }, "image/png");
  });

  (async () => {
    initBubbles();
    await initAssets();

    // splashes
    [openListBtn, uploadBtn, downloadWakuBtn, listBackBtn, shuffleBtn, backBtn, resetBtn, downloadBtn]
      .forEach(bindSplash);

    pickHint();
    setScreen("home");
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
