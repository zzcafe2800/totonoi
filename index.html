<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>プランク集会</title>
  <style>
    :root{
      --bg1:#061a2a;
      --bg2:#020a14;

      --text: rgba(244,252,255,.95);
      --muted: rgba(244,252,255,.62);

      --glass: rgba(10, 26, 45, .48);
      --glass2: rgba(10, 26, 45, .30);
      --border: rgba(190, 245, 255, .18);

      --shadow: 0 18px 45px rgba(0,0,0,.35);
      --r: 20px;

      /* semantic colors */
      --primary: rgba(130, 220, 255, .98);    /* upload / main */
      --primarySoft: rgba(130, 220, 255, .14);

      --list: rgba(170, 150, 255, .95);       /* list */
      --listSoft: rgba(170, 150, 255, .14);

      --frame: rgba(100, 240, 180, .95);      /* waku */
      --frameSoft: rgba(100, 240, 180, .14);

      --danger: rgba(255, 130, 150, .95);
      --dangerSoft: rgba(255, 130, 150, .12);

      --focus: rgba(130,220,255,.55);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin:0;
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Meiryo", Arial;
      overflow-x:hidden;
      background:
        radial-gradient(1100px 700px at 10% 10%, rgba(130,220,255,.22), transparent 60%),
        radial-gradient(900px 600px at 90% 20%, rgba(170,150,255,.12), transparent 62%),
        radial-gradient(900px 600px at 70% 95%, rgba(100,240,180,.10), transparent 55%),
        linear-gradient(180deg, var(--bg1) 0%, #03121f 55%, var(--bg2) 100%);
    }

    /* caustics */
    .caustics{
      position: fixed;
      inset: -30%;
      pointer-events:none;
      opacity:.12;
      background:
        radial-gradient(circle at 10% 20%, rgba(255,255,255,.85) 0 2px, transparent 3px),
        radial-gradient(circle at 30% 40%, rgba(255,255,255,.85) 0 2px, transparent 3px),
        radial-gradient(circle at 55% 30%, rgba(255,255,255,.85) 0 2px, transparent 3px),
        radial-gradient(circle at 75% 60%, rgba(255,255,255,.85) 0 2px, transparent 3px),
        radial-gradient(circle at 90% 35%, rgba(255,255,255,.85) 0 2px, transparent 3px);
      filter: blur(1px);
      animation: drift 14s ease-in-out infinite;
      transform: rotate(-7deg);
    }
    @keyframes drift{
      0%{ transform: translate3d(-1%, -1%, 0) rotate(-6deg) scale(1.02); }
      50%{ transform: translate3d(1.2%, 1%, 0) rotate(-8deg) scale(1.04); }
      100%{ transform: translate3d(-1%, -1%, 0) rotate(-6deg) scale(1.02); }
    }

    /* bubbles */
    .bubbles{ position:fixed; inset:0; pointer-events:none; opacity:.32; }
    .bubble{
      position:absolute;
      width: 10px; height: 10px;
      border-radius: 999px;
      border: 1px solid rgba(200,250,255,.35);
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 55%);
      filter: blur(.2px);
      animation: rise linear infinite;
    }
    @keyframes rise{
      from{ transform: translateY(105vh) scale(.7); opacity:0; }
      10%{ opacity:.7; }
      to{ transform: translateY(-20vh) scale(1.05); opacity:0; }
    }

    .wrap{
      min-height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding: 26px 18px 32px;
      gap: 14px;
    }

    /* Header */
    .top{
      width: min(1100px, 100%);
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap: 12px;
      padding: 6px 2px 2px;
    }
    .title{
      display:flex;
      align-items:center;
      gap: 10px;
      font-weight: 950;
      letter-spacing: .2px;
      font-size: 22px;
      text-shadow: 0 10px 28px rgba(0,0,0,.35);
    }
    .dot{
      width: 10px; height: 10px;
      border-radius: 999px;
      background: var(--primary);
      box-shadow: 0 0 0 9px rgba(130,220,255,.12);
    }
    .sub{
      color: var(--muted);
      font-size: 12px;
      line-height:1.2;
      user-select:none;
      white-space:nowrap;
      text-align:right;
    }

    /* Panels */
    .panel{
      width:min(1100px, 100%);
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--glass), var(--glass2));
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Buttons */
    .btn{
      position:relative;
      appearance:none;
      border: 1px solid rgba(190,245,255,.18);
      background: rgba(255,255,255,.05);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 16px;
      cursor:pointer;
      font-weight: 900;
      letter-spacing:.2px;
      user-select:none;
      transition: transform .08s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease, filter .18s ease;
      overflow:hidden;
      white-space: nowrap;
    }
    .btn:hover{
      box-shadow: 0 0 0 4px rgba(130,220,255,.10), 0 18px 40px rgba(0,0,0,.25);
      filter: brightness(1.03);
    }
    .btn:active{ transform: translateY(1px) scale(.99); }
    .btn:focus-visible{
      outline:none;
      box-shadow: 0 0 0 5px rgba(130,220,255,.18);
      border-color: rgba(130,220,255,.55);
    }

    /* color roles */
    .btn.primary{
      border-color: rgba(130,220,255,.55);
      background: linear-gradient(180deg, rgba(130,220,255,.22), rgba(255,255,255,.04));
    }
    .btn.primary:hover{
      box-shadow: 0 0 0 4px rgba(130,220,255,.14), 0 20px 46px rgba(0,0,0,.25);
    }
    .btn.list{
      border-color: rgba(170,150,255,.55);
      background: linear-gradient(180deg, rgba(170,150,255,.20), rgba(255,255,255,.04));
    }
    .btn.frame{
      border-color: rgba(100,240,180,.55);
      background: linear-gradient(180deg, rgba(100,240,180,.18), rgba(255,255,255,.04));
    }
    .btn.danger{
      border-color: rgba(255,130,150,.55);
      background: linear-gradient(180deg, rgba(255,130,150,.18), rgba(255,255,255,.04));
    }

    /* splash droplets */
    .droplet{
      position:absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s);
      height: var(--s);
      border-radius: 999px;
      pointer-events:none;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.90), rgba(255,255,255,.25) 35%, transparent 70%);
      border: 1px solid rgba(200,250,255,.26);
      transform: translate(-50%,-50%) scale(.5);
      opacity: .0;
      animation: splash 650ms ease-out forwards;
      filter: blur(.15px);
    }
    @keyframes splash{
      0%{ transform: translate(-50%,-50%) scale(.45); opacity:0; }
      15%{ opacity:.85; }
      100%{
        transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(1.05);
        opacity:0;
      }
    }

    /* HOME layout: clear hierarchy */
    #home{ padding: 16px; }
    .homeGrid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items:stretch;
    }
    @media (max-width: 860px){
      .homeGrid{ grid-template-columns: 1fr; }
    }

    .hero{
      border-radius: 18px;
      border: 1px solid rgba(190,245,255,.14);
      background: rgba(255,255,255,.03);
      padding: 16px;
      display:flex;
      flex-direction:column;
      gap: 10px;
    }
    .heroBig{
      font-weight: 950;
      font-size: 20px;
      line-height: 1.15;
      letter-spacing:.2px;
    }
    .heroSmall{
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .homeActions{
      display:flex;
      flex-direction:column;
      gap: 10px;
      justify-content:center;
    }

    /* Upload button as big CTA */
    .uploadBtn{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
      padding: 14px 14px;
      border-radius: 18px;
    }
    .uploadLeft{
      display:flex; align-items:center; gap: 12px;
    }
    .badgeIcon{
      width: 34px; height: 34px; border-radius: 999px;
      display:flex; align-items:center; justify-content:center;
      border: 1px solid rgba(190,245,255,.18);
      background: rgba(255,255,255,.05);
      box-shadow: 0 0 0 8px rgba(130,220,255,.10);
      font-weight: 950;
    }
    .uploadTxt{
      display:flex; flex-direction:column; gap: 2px; line-height:1.1;
    }
    .uploadTxt .t1{ font-weight: 950; font-size: 15px; }
    .uploadTxt .t2{ color: var(--muted); font-size: 12px; }

    .hintPill{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(190,245,255,.14);
      background: rgba(255,255,255,.04);
      color: var(--muted);
      font-size: 12px;
      user-select:none;
      width: fit-content;
    }

    /* Editor */
    #editor{ display:none; width:min(1100px,100%); }
    #editor.active{ display:block; }

    .toolbar{
      padding: 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .left, .right{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .stageShell{
      width: min(1100px, 100%);
      border: 1px solid rgba(190,245,255,.14);
      border-radius: 22px;
      overflow:hidden;
      background: rgba(0,0,0,.28);
      box-shadow: 0 22px 60px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    canvas{
      width: 100%;
      height: auto;
      display:block;
      touch-action:none;
    }

    /* LIST: not cluttered -> focus area with 1~3 big cards */
    #list{ display:none; width:min(1100px,100%); }
    #list.active{ display:block; }

    .listHeader{
      padding: 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .seg{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .modeBtn{
      border: 1px solid rgba(190,245,255,.14);
      background: rgba(255,255,255,.04);
      padding: 10px 12px;
      border-radius: 999px;
      cursor:pointer;
      font-weight: 900;
      color: var(--text);
      user-select:none;
      transition: filter .18s ease, box-shadow .18s ease, border-color .18s ease, transform .08s ease, background .18s ease;
      overflow:hidden;
      position:relative;
      white-space:nowrap;
    }
    .modeBtn:hover{
      border-color: rgba(130,220,255,.45);
      box-shadow: 0 0 0 4px rgba(130,220,255,.08);
      filter: brightness(1.03);
    }
    .modeBtn:active{ transform: translateY(1px); }
    .modeBtn.on{
      border-color: rgba(130,220,255,.62);
      background: rgba(130,220,255,.12);
      box-shadow: 0 0 0 4px rgba(130,220,255,.10);
    }

    .focusArea{
      padding: 14px;
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 12px;
      align-items:stretch;
    }
    @media (max-width: 920px){
      .focusArea{ grid-template-columns: 1fr; }
    }

    .focusMain{
      border-radius: 20px;
      border: 1px solid rgba(190,245,255,.14);
      background: rgba(255,255,255,.03);
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap: 12px;
    }

    .bigTask{
      border-radius: 20px;
      border: 1px solid rgba(190,245,255,.14);
      background: rgba(255,255,255,.04);
      padding: 16px;
      position:relative;
      overflow:hidden;
      box-shadow: 0 18px 45px rgba(0,0,0,.18);
    }
    .bigTask::before{
      content:"";
      position:absolute;
      inset:-40%;
      background: radial-gradient(circle at 30% 30%, rgba(130,220,255,.12), transparent 60%);
      transform: rotate(-8deg);
      pointer-events:none;
    }
    .bigTaskTitle{
      position:relative;
      font-weight: 980;
      letter-spacing:.2px;
      font-size: 22px;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .bigTaskMeta{
      position:relative;
      color: var(--muted);
      font-size: 13px;
      display:flex;
      gap: 8px;
      align-items:center;
    }
    .tag{
      display:inline-flex;
      align-items:center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid rgba(190,245,255,.12);
      background: rgba(255,255,255,.03);
      color: var(--muted);
      font-size: 12px;
      user-select:none;
      width: fit-content;
    }

    .focusSide{
      border-radius: 20px;
      border: 1px solid rgba(190,245,255,.14);
      background: rgba(255,255,255,.03);
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap: 10px;
      justify-content:center;
    }
    .sideTitle{
      font-weight: 950;
      letter-spacing:.2px;
      font-size: 14px;
      color: rgba(244,252,255,.9);
    }
    .sideText{
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .toast{
      position: fixed;
      left: 50%;
      top: 16px;
      transform: translateX(-50%);
      background: rgba(10, 26, 45, .78);
      border: 1px solid rgba(190,245,255,.18);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 999px;
      box-shadow: 0 18px 45px rgba(0,0,0,.35);
      font-size: 13px;
      display:none;
      max-width: min(92vw, 900px);
      z-index: 9999;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .toast.show{ display:block; }

    /* hidden input */
    #fileInput{ display:none; }
  </style>
</head>

<body>
  <div class="caustics"></div>
  <div class="bubbles" id="bubbles"></div>

  <div class="wrap">
    <div class="top">
      <div class="title"><span class="dot"></span>プランク集会</div>
      <div class="sub">画像:1600×900 / スタンプ:長押し</div>
    </div>

    <!-- HOME -->
    <section id="home" class="panel">
      <div class="homeGrid">
        <div class="hero">
          <div class="heroBig">やることを<br>“少なく”見せる</div>
          <div class="heroSmall">
            一覧は最大3つだけ。迷わないように “今の候補” を出します。<br>
            画像編集は「読み込み」から。
          </div>
          <div class="hintPill">💧 長押しでスタンプ</div>
        </div>

        <div class="homeActions">
          <button id="openListBtn" class="btn list uploadBtn">
            <div class="uploadLeft">
              <div class="badgeIcon" style="box-shadow:0 0 0 8px rgba(170,150,255,.10);">≡</div>
              <div class="uploadTxt">
                <div class="t1">整い一覧</div>
                <div class="t2">おすすめを3つだけ出す</div>
              </div>
            </div>
            <div style="opacity:.9;">→</div>
          </button>

          <button id="uploadBtn" class="btn primary uploadBtn">
            <div class="uploadLeft">
              <div class="badgeIcon">⇪</div>
              <div class="uploadTxt">
                <div class="t1">画像を読み込む</div>
                <div class="t2">1600×900のみ</div>
              </div>
            </div>
            <div style="opacity:.9;">＋</div>
          </button>

          <button id="downloadWakuBtn" class="btn frame uploadBtn">
            <div class="uploadLeft">
              <div class="badgeIcon" style="box-shadow:0 0 0 8px rgba(100,240,180,.10);">▢</div>
              <div class="uploadTxt">
                <div class="t1">waku1 を保存</div>
                <div class="t2">枠画像のダウンロード</div>
              </div>
            </div>
            <div style="opacity:.9;">↓</div>
          </button>

          <input id="fileInput" type="file" accept="image/*" />
        </div>
      </div>
    </section>

    <!-- LIST (re-designed, low information) -->
    <section id="list" class="panel">
      <div class="listHeader">
        <div class="seg">
          <button id="listBackBtn" class="btn">戻る</button>
          <span class="tag" id="listState">おすすめ：ミックス3</span>
        </div>
        <div class="seg">
          <button class="modeBtn on" id="modeMix">ミックス3</button>
          <button class="modeBtn" id="modeClose">① 今日を閉じる</button>
          <button class="modeBtn" id="modeTomorrow">② 明日を軽く</button>
          <button class="modeBtn" id="modeTen">③ 10分</button>
        </div>
      </div>

      <div class="focusArea">
        <div class="focusMain" id="focusMain"></div>

        <div class="focusSide">
          <div class="sideTitle">使い方</div>
          <div class="sideText">
            まずはこの画面に出たものだけ見ればOK。<br>
            “次”で候補を入れ替えます。
          </div>
          <button id="nextBtn" class="btn primary">次の候補</button>
          <button id="showMoreBtn" class="btn">もっと見る（+3）</button>
          <button id="resetViewBtn" class="btn">3つに戻す</button>
        </div>
      </div>
    </section>

    <!-- EDITOR -->
    <section id="editor">
      <div class="panel toolbar">
        <div class="left">
          <button id="backBtn" class="btn">戻る</button>
          <button id="resetBtn" class="btn danger">リセット</button>
          <span class="tag">長押しでスタンプ</span>
        </div>
        <div class="right">
          <button id="downloadBtn" class="btn frame">ダウンロード</button>
        </div>
      </div>

      <div class="stageShell">
        <canvas id="stage" width="1600" height="900"></canvas>
      </div>
    </section>
  </div>

  <div id="toast" class="toast"></div>

      "洗い物全部やる",
      "洗面台を整える",
      "ベッドを整える",
      "冷蔵庫の期限確認",
      "不要な物を3つ捨てる",
      "本を5冊戻す"
    ]
  };

  const CAT_LABEL = {
    mix: "おすすめ：ミックス3",
    close: "① 今日を閉じる",
    tomorrow: "② 明日を軽く",
    ten: "③ 10分"
  };

  // ====== DOM ======
  const toast = document.getElementById("toast");

  const home = document.getElementById("home");
  const list = document.getElementById("list");
  const editor = document.getElementById("editor");

  const openListBtn = document.getElementById("openListBtn");
  const listBackBtn = document.getElementById("listBackBtn");
  const listState = document.getElementById("listState");

  const uploadBtn = document.getElementById("uploadBtn");
  const downloadWakuBtn = document.getElementById("downloadWakuBtn");
  const fileInput = document.getElementById("fileInput");

  const backBtn = document.getElementById("backBtn");
  const resetBtn = document.getElementById("resetBtn");
  const downloadBtn = document.getElementById("downloadBtn");

  const focusMain = document.getElementById("focusMain");
  const nextBtn = document.getElementById("nextBtn");
  const showMoreBtn = document.getElementById("showMoreBtn");
  const resetViewBtn = document.getElementById("resetViewBtn");

  const modeMix = document.getElementById("modeMix");
  const modeClose = document.getElementById("modeClose");
  const modeTomorrow = document.getElementById("modeTomorrow");
  const modeTen = document.getElementById("modeTen");

  // ====== Canvas ======
  const canvas = document.getElementById("stage");
  const ctx = canvas.getContext("2d", { alpha: true });

  let wakuImg = null;
  let sutaImg = null;
  let baseImg = null;
  let stamps = [];

  let holding = false;
  let holdStart = 0;
  let holdX = 0, holdY = 0;
  let holdCommitted = false;

  // ====== List state ======
  let mode = "mix"; // mix | close | tomorrow | ten
  let showCount = 3;

  function showToast(msg, ms=2200){
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toast.classList.remove("show"), ms);
  }

  function setView(which){
    home.style.display = (which === "home") ? "block" : "none";
    list.style.display = (which === "list") ? "block" : "none";
    editor.style.display = (which === "editor") ? "block" : "none";
  }

  function loadFirstExisting(candidates){
    return new Promise((resolve, reject) => {
      let i = 0;
      const tryNext = () => {
        if(i >= candidates.length) return reject(new Error("not found"));
        const src = candidates[i++];
        const img = new Image();
        img.onload = () => resolve({img, src});
        img.onerror = () => tryNext();
        img.src = src + "?v=" + Date.now();
      };
      tryNext();
    });
  }

  async function initAssets(){
    try{ wakuImg = (await loadFirstExisting(WAKU_CANDIDATES)).img; }
    catch{ showToast("waku1.PNG が見つからない"); }

    try{ sutaImg = (await loadFirstExisting(SUTA_CANDIDATES)).img; }
    catch{ showToast("suta.PNG が見つからない"); }
  }

  function downloadBlob(blob, filename){
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1500);
  }

  // ====== Splash ======
  function splash(el, x, y){
    const rect = el.getBoundingClientRect();
    const rx = x / rect.width;
    const ry = y / rect.height;
    const count = 8 + Math.floor(Math.random() * 5);

    for(let i=0;i<count;i++){
      const d = document.createElement("span");
      d.className = "droplet";
      const size = (6 + Math.random()*10).toFixed(1) + "px";
      const angle = Math.random()*Math.PI*2;
      const dist = 14 + Math.random()*34;
      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;

      d.style.setProperty("--x", (rx*100).toFixed(2) + "%");
      d.style.setProperty("--y", (ry*100).toFixed(2) + "%");
      d.style.setProperty("--s", size);
      d.style.setProperty("--dx", dx.toFixed(1) + "px");
      d.style.setProperty("--dy", dy.toFixed(1) + "px");
      el.appendChild(d);
      d.addEventListener("animationend", () => d.remove(), { once:true });
    }
  }

  function bindSplash(el){
    let last = 0;
    el.addEventListener("pointerenter", (e) => {
      const r = el.getBoundingClientRect();
      splash(el, e.clientX - r.left, e.clientY - r.top);
    });
    el.addEventListener("pointermove", (e) => {
      const now = performance.now();
      if(now - last < 160) return;
      last = now;
      const r = el.getBoundingClientRect();
      splash(el, e.clientX - r.left, e.clientY - r.top);
    });
  }

  // ====== bubbles ======
  function initBubbles(){
    const box = document.getElementById("bubbles");
    const n = 18;
    for(let i=0;i<n;i++){
      const b = document.createElement("div");
      b.className = "bubble";
      const left = Math.random()*100;
      const size = 6 + Math.random()*16;
      const dur = 10 + Math.random()*14;
      const delay = -Math.random()*dur;
      b.style.left = left.toFixed(2) + "vw";
      b.style.width = size.toFixed(1) + "px";
      b.style.height = size.toFixed(1) + "px";
      b.style.animationDuration = dur.toFixed(2) + "s";
      b.style.animationDelay = delay.toFixed(2) + "s";
      b.style.opacity = (0.16 + Math.random()*0.34).toFixed(2);
      box.appendChild(b);
    }
  }

  // ====== draw (waku bottom, ring top) ======
  function draw(now){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // waku bottom
    if(wakuImg){
      ctx.drawImage(wakuImg, 0,0, canvas.width, canvas.height);
    }else{
      ctx.fillStyle = "rgba(0,0,0,.35)";
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    // user image
    if(baseImg){
      ctx.drawImage(baseImg, 0,0, canvas.width, canvas.height);
    }

    // stamps
    if(sutaImg){
      for(const st of stamps){
        const sz = st.size;
        ctx.drawImage(sutaImg, st.x - sz/2, st.y - sz/2, sz, sz);
      }
    }

    // ring on top
    if(holding){
      const t = Math.max(0, Math.min(1, (now - holdStart) / HOLD_MS));
      const r = 54;

      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.lineWidth = 12;
      ctx.lineCap = "round";

      ctx.strokeStyle = "rgba(244,252,255,.28)";
      ctx.beginPath();
      ctx.arc(holdX, holdY, r, 0, Math.PI*2);
      ctx.stroke();

      ctx.strokeStyle = "rgba(130,220,255,.98)";
      ctx.beginPath();
      ctx.arc(holdX, holdY, r, -Math.PI/2, -Math.PI/2 + (Math.PI*2)*t);
      ctx.stroke();

      ctx.fillStyle = "rgba(244,252,255,.95)";
      ctx.beginPath();
      ctx.arc(holdX, holdY, 5, 0, Math.PI*2);
      ctx.fill();

      ctx.restore();

      if(t >= 1 && !holdCommitted){
        holdCommitted = true;
        stamps.push({x: holdX, y: holdY, size: STAMP_SIZE_PX});
        showToast("スタンプOK");
      }
    }
  }

  function loop(now){
    draw(now);
    requestAnimationFrame(loop);
  }

  function getCanvasPoint(e){
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width;
    const sy = canvas.height / rect.height;
    return { x:(e.clientX-rect.left)*sx, y:(e.clientY-rect.top)*sy };
  }
  function cancelHold(){
    holding=false; holdStart=0; holdCommitted=false;
  }

  canvas.addEventListener("pointerdown", (e) => {
    if(!baseImg){ showToast("先に画像を読み込む"); return; }
    if(!sutaImg){ showToast("suta.PNG がない"); return; }
    const p = getCanvasPoint(e);
    holding = true;
    holdCommitted = false;
    holdStart = performance.now();
    holdX = p.x; holdY = p.y;
    canvas.setPointerCapture(e.pointerId);
  });
  canvas.addEventListener("pointermove", (e) => {
    if(!holding) return;
    const p = getCanvasPoint(e);
    holdX = p.x; holdY = p.y;
  });
  const end = () => { if(holding) cancelHold(); };
  canvas.addEventListener("pointerup", end);
  canvas.addEventListener("pointercancel", end);

  // ====== LIST logic (low info) ======
  function shuffled(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function mixPick(n){
    // mix: 1 from each category when possible
    const a = shuffled(MICRO.close);
    const b = shuffled(MICRO.tomorrow);
    const c = shuffled(MICRO.ten);
    const out = [];
    // rotate categories
    const seq = [ ["close",a], ["tomorrow",b], ["ten",c] ];
    let idx = 0;
    while(out.length < n){
      const [cat, pool] = seq[idx % 3];
      if(pool.length){
        out.push({ cat, text: pool.shift() });
      }else{
        // fallback from full micro mix
        const all = shuffled([...MICRO.close, ...MICRO.tomorrow, ...MICRO.ten]);
        out.push({ cat:"mix", text: all[out.length % all.length] });
      }
      idx++;
    }
    return out;
  }

  function catPick(cat, n){
    const pool = shuffled(MICRO[cat]);
    const out = [];
    for(let i=0;i<n;i++){
      out.push({ cat, text: pool[i % pool.length] });
    }
    return out;
  }

  function catTitle(cat){
    if(cat === "close") return "🌙 今日を閉じる";
    if(cat === "tomorrow") return "🌙 明日を軽く";
    if(cat === "ten") return "🌙 10分";
    return "🌊 おすすめ";
  }

  function renderList(){
    listState.textContent = CAT_LABEL[mode];

    let items = [];
    if(mode === "mix") items = mixPick(showCount);
    if(mode === "close") items = catPick("close", showCount);
    if(mode === "tomorrow") items = catPick("tomorrow", showCount);
    if(mode === "ten") items = catPick("ten", showCount);

    focusMain.innerHTML = "";
    items.forEach((it, i) => {
      const card = document.createElement("div");
      card.className = "bigTask";
      card.innerHTML = `
        <div class="bigTaskTitle">${it.text}</div>
        <div class="bigTaskMeta">
          <span class="tag">${catTitle(it.cat)}</span>
          <span style="color:rgba(244,252,255,.65); font-weight:900;">#${i+1}</span>
        </div>
      `;
      focusMain.appendChild(card);
      bindSplash(card);
    });
  }

  function setMode(newMode){
    mode = newMode;
    // toggle button UI
    [modeMix, modeClose, modeTomorrow, modeTen].forEach(b => b.classList.remove("on"));
    if(newMode === "mix") modeMix.classList.add("on");
    if(newMode === "close") modeClose.classList.add("on");
    if(newMode === "tomorrow") modeTomorrow.classList.add("on");
    if(newMode === "ten") modeTen.classList.add("on");
    showCount = 3;
    renderList();
  }

  // ====== HOME events ======
  uploadBtn.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", () => {
    const file = fileInput.files?.[0];
    if(!file) return;

    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const w = img.naturalWidth, h = img.naturalHeight;
      if(w === 1600 && h === 900){
        baseImg = img;
        stamps = [];
        cancelHold();
        setView("editor");
        showToast("読み込みOK");
      }else{
        showToast("1600×900のみ");
        URL.revokeObjectURL(url);
        fileInput.value = "";
      }
    };
    img.onerror = () => {
      showToast("読み込み失敗");
      URL.revokeObjectURL(url);
      fileInput.value = "";
    };
    img.src = url;
  });

  downloadWakuBtn.addEventListener("click", async () => {
    for(const name of WAKU_CANDIDATES){
      try{
        const r = await fetch(name, {cache:"no-store"});
        if(!r.ok) continue;
        downloadBlob(await r.blob(), "waku1.png");
        return;
      }catch{}
    }
    showToast("waku1 がない");
  });

  openListBtn.addEventListener("click", () => {
    setView("list");
    renderList();
  });

  listBackBtn.addEventListener("click", () => setView("home"));

  // ====== list events ======
  modeMix.addEventListener("click", () => setMode("mix"));
  modeClose.addEventListener("click", () => setMode("close"));
  modeTomorrow.addEventListener("click", () => setMode("tomorrow"));
  modeTen.addEventListener("click", () => setMode("ten"));

  nextBtn.addEventListener("click", () => {
    renderList();
  });

  showMoreBtn.addEventListener("click", () => {
    showCount = Math.min(12, showCount + 3);
    renderList();
  });

  resetViewBtn.addEventListener("click", () => {
    showCount = 3;
    renderList();
  });

  // ====== editor events ======
  backBtn.addEventListener("click", () => {
    baseImg = null;
    stamps = [];
    cancelHold();
    fileInput.value = "";
    setView("home");
  });

  resetBtn.addEventListener("click", () => {
    stamps = [];
    cancelHold();
    showToast("スタンプ消去");
  });

  downloadBtn.addEventListener("click", () => {
    if(!baseImg){ showToast("画像がない"); return; }
    canvas.toBlob((blob) => {
      if(!blob){ showToast("保存失敗"); return; }
      downloadBlob(blob, "stamped.png");
    }, "image/png");
  });

  // ====== init splashes ======
  function bindBaseSplashes(){
    [openListBtn, uploadBtn, downloadWakuBtn, nextBtn, showMoreBtn, resetViewBtn,
     modeMix, modeClose, modeTomorrow, modeTen, listBackBtn, backBtn, resetBtn, downloadBtn
    ].forEach(bindSplash);
  }

  // ====== start ======
  (async () => {
    initBubbles();
    await initAssets();
    bindBaseSplashes();
    setMode("mix");
    setView("home");
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
