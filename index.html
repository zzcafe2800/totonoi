<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stamp Tool</title>
  <style>
    :root{
      --bg:#0b0c10;
      --panel:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.14);
      --text:#eef0ff;
      --muted:#aab2db;
      --accent:#7aa7ff;
      --danger:#ff6b7a;
      --ok:#62d28f;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --r:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(122,167,255,.18), transparent 55%),
        radial-gradient(900px 600px at 90% 20%, rgba(98,210,143,.12), transparent 60%),
        var(--bg);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Meiryo", Arial;
    }
    .card{
      width:min(1100px, 100%);
      border:1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    header{
      padding:16px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom:1px solid var(--border);
    }
    .title{
      font-weight:800;
      letter-spacing:.2px;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .dot{
      width:10px;height:10px;border-radius:999px;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(122,167,255,.18);
    }

    .content{ padding:18px; }

    /* HOME (simple) */
    #home{
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:stretch;
    }
    .row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    input[type="file"]{
      flex:1;
      min-width:260px;
      padding:12px;
      border-radius: 12px;
      border:1px dashed rgba(255,255,255,.22);
      background: rgba(255,255,255,.04);
      color:var(--muted);
    }
    .btn{
      appearance:none;
      border:1px solid var(--border);
      background: rgba(255,255,255,.06);
      color:var(--text);
      padding:12px 14px;
      border-radius: 14px;
      cursor:pointer;
      font-weight:750;
      letter-spacing:.2px;
      user-select:none;
      transition: transform .04s ease, background .15s ease, border-color .15s ease, opacity .15s ease;
    }
    .btn:hover{ background: rgba(255,255,255,.10); }
    .btn:active{ transform: translateY(1px); }
    .btn.ok{
      border-color: rgba(98,210,143,.45);
      background: rgba(98,210,143,.14);
    }
    .btn.danger{
      border-color: rgba(255,107,122,.45);
      background: rgba(255,107,122,.14);
    }
    .btn.primary{
      border-color: rgba(122,167,255,.45);
      background: rgba(122,167,255,.18);
    }
    .hint{
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
    }

    /* EDITOR */
    #editor{ display:none; }
    #editor.active{ display:block; }

    .toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:12px;
    }
    .toolbar .left, .toolbar .right{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .badge{
      font-size:12px;
      color:var(--muted);
      padding:8px 10px;
      border:1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
    }

    .stageWrap{
      border-radius: var(--r);
      overflow:hidden;
      border:1px solid var(--border);
      background: rgba(0,0,0,.28);
      position:relative;
    }
    canvas{
      width:100%;
      height:auto;
      display:block;
      touch-action:none;
    }

    .toast{
      position: fixed;
      left: 50%;
      top: 16px;
      transform: translateX(-50%);
      background: rgba(20,22,34,.92);
      border:1px solid var(--border);
      color: var(--text);
      padding:10px 12px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      font-size: 13px;
      display:none;
      max-width: min(92vw, 900px);
      z-index: 9999;
    }
    .toast.show{ display:block; }
  </style>
</head>

<body>
  <div class="card">
    <header>
      <div class="title"><span class="dot"></span>スタンプ合成</div>
      <div class="hint">長押しでスタンプ（1600×900のみ）</div>
    </header>

    <div class="content">
      <!-- HOME -->
      <section id="home">
        <div class="row">
          <input id="fileInput" type="file" accept="image/*" />
          <button id="downloadWakuBtn" class="btn ok">waku1 DL</button>
        </div>
      </section>

      <!-- EDITOR -->
      <section id="editor">
        <div class="toolbar">
          <div class="left">
            <button id="backBtn" class="btn primary">戻る</button>
            <button id="resetBtn" class="btn danger">リセット</button>
            <span id="badge" class="badge">スタンプ：長押し</span>
          </div>
          <div class="right">
            <button id="downloadBtn" class="btn ok">ダウンロード</button>
          </div>
        </div>

        <div class="stageWrap">
          <canvas id="stage" width="1600" height="900"></canvas>
        </div>

        <div class="hint" style="margin-top:10px">
          画面を押し続けると円が一周 → スタンプ確定。離すとキャンセル。
        </div>
      </section>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script>
(() => {
  // ====== ここでスタンプサイズを変更（px / 1600x900基準） ======
  const STAMP_SIZE_PX = 180;   // ←好きに変えてOK
  // ====== 長押し時間 ======
  const HOLD_MS = 3000;

  // 画像名フォールバック
  const WAKU_CANDIDATES = ["waku1.PNG","waku1.png","WAKU1.PNG","WAKU1.png"];
  const SUTA_CANDIDATES = ["suta.PNG","suta.png","SUTA.PNG","SUTA.png"];

  const home = document.getElementById("home");
  const editor = document.getElementById("editor");

  const fileInput = document.getElementById("fileInput");
  const downloadWakuBtn = document.getElementById("downloadWakuBtn");

  const backBtn = document.getElementById("backBtn");
  const resetBtn = document.getElementById("resetBtn");
  const downloadBtn = document.getElementById("downloadBtn");
  const badge = document.getElementById("badge");

  const canvas = document.getElementById("stage");
  const ctx = canvas.getContext("2d", { alpha: true });

  const toast = document.getElementById("toast");

  // state
  let wakuImg = null;
  let sutaImg = null;
  let baseImg = null;      // user image (1600x900)
  let stamps = [];         // {x,y,size}

  // hold visual
  let holding = false;
  let holdStart = 0;
  let holdX = 0, holdY = 0;
  let holdCommitted = false;

  function showToast(msg, ms=2600){
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toast.classList.remove("show"), ms);
  }

  function setView(which){
    if(which === "home"){
      home.style.display = "flex";
      editor.classList.remove("active");
    }else{
      home.style.display = "none";
      editor.classList.add("active");
    }
  }

  function loadFirstExisting(candidates){
    return new Promise((resolve, reject) => {
      let i = 0;
      const tryNext = () => {
        if(i >= candidates.length) return reject(new Error("not found"));
        const src = candidates[i++];
        const img = new Image();
        img.onload = () => resolve({img, src});
        img.onerror = () => tryNext();
        img.src = src + "?v=" + Date.now(); // cache bust
      };
      tryNext();
    });
  }

  async function initAssets(){
    // waku
    try{
      const w = await loadFirstExisting(WAKU_CANDIDATES);
      wakuImg = w.img;
    }catch{
      showToast("waku1.PNG が見つかりません（index.htmlと同じ階層に置いてね）", 3800);
    }

    // suta
    try{
      const s = await loadFirstExisting(SUTA_CANDIDATES);
      sutaImg = s.img;
    }catch{
      showToast("suta.PNG が見つかりません（index.htmlと同じ階層に置いてね）", 3800);
    }
  }

  function downloadBlob(blob, filename){
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1500);
  }

  function downloadByUrl(url, filename){
    fetch(url).then(r => r.blob()).then(b => downloadBlob(b, filename))
      .catch(()=>showToast("ダウンロード失敗（ファイル名/配置を確認）"));
  }

  // ===== draw =====
function draw(now){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // ① waku を最下層（背景）にする
  if(wakuImg){
    ctx.drawImage(wakuImg, 0,0, canvas.width, canvas.height);
  }else{
    ctx.fillStyle = "rgba(0,0,0,.35)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  // ② ユーザー画像をその上に
  if(baseImg){
    ctx.drawImage(baseImg, 0,0, canvas.width, canvas.height);
  }

  // ③ スタンプをその上に（リアルタイム表示）
  if(sutaImg){
    for(const st of stamps){
      const sz = st.size;
      ctx.drawImage(sutaImg, st.x - sz/2, st.y - sz/2, sz, sz);
    }
  }

  // ④ 長押しリングは一番上（必ず見える）
  if(holding){
    const t = Math.max(0, Math.min(1, (now - holdStart) / HOLD_MS));
    const r = 52;

    ctx.save();
    ctx.globalCompositeOperation = "source-over";
    ctx.lineWidth = 12;
    ctx.lineCap = "round";

    ctx.strokeStyle = "rgba(255,255,255,.35)";
    ctx.beginPath();
    ctx.arc(holdX, holdY, r, 0, Math.PI*2);
    ctx.stroke();

    ctx.strokeStyle = "rgba(122,167,255,.98)";
    ctx.beginPath();
    ctx.arc(holdX, holdY, r, -Math.PI/2, -Math.PI/2 + (Math.PI*2)*t);
    ctx.stroke();

    ctx.fillStyle = "rgba(255,255,255,.95)";
    ctx.beginPath();
    ctx.arc(holdX, holdY, 5, 0, Math.PI*2);
    ctx.fill();

    ctx.restore();

    // 3秒達成で1回だけ確定
    if(t >= 1 && !holdCommitted){
      holdCommitted = true;
      stamps.push({x: holdX, y: holdY, size: STAMP_SIZE_PX});
      showToast("スタンプOK");
    }
  }
}
  function loop(now){
    draw(now);
    requestAnimationFrame(loop);
  }

  // ===== pointer =====
  function getCanvasPoint(e){
    const rect = canvas.getBoundingClientRect();
    const sx = canvas.width / rect.width;
    const sy = canvas.height / rect.height;
    return {
      x: (e.clientX - rect.left) * sx,
      y: (e.clientY - rect.top) * sy
    };
  }

  function cancelHold(){
    holding = false;
    holdStart = 0;
    holdCommitted = false;
  }

  canvas.addEventListener("pointerdown", (e) => {
    if(!baseImg){ showToast("先に画像を読み込んでね"); return; }
    if(!sutaImg){ showToast("suta.PNG が読み込めていません"); return; }

    // 押し始めた瞬間から円開始
    const p = getCanvasPoint(e);
    holding = true;
    holdCommitted = false;
    holdStart = performance.now();
    holdX = p.x; holdY = p.y;

    canvas.setPointerCapture(e.pointerId);
  });

  canvas.addEventListener("pointermove", (e) => {
    if(!holding) return;
    // 押してる間は位置追従（押し直し感覚）
    const p = getCanvasPoint(e);
    holdX = p.x; holdY = p.y;
  });

  const end = () => {
    if(!holding) return;
    // 離したら必ずリセット（キャンセル or 確定後も次の押しに備える）
    cancelHold();
  };

  canvas.addEventListener("pointerup", end);
  canvas.addEventListener("pointercancel", end);

  // ===== UI events =====
  fileInput.addEventListener("change", () => {
    const file = fileInput.files?.[0];
    if(!file) return;

    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const w = img.naturalWidth, h = img.naturalHeight;
      if(w === 1600 && h === 900){
        baseImg = img;
        stamps = [];
        cancelHold();
        setView("editor");
        showToast("読み込みOK");
      }else{
        showToast(`1600×900のみ対応（今: ${w}×${h}）`, 3600);
        URL.revokeObjectURL(url);
        fileInput.value = "";
      }
    };
    img.onerror = () => {
      showToast("画像の読み込みに失敗");
      URL.revokeObjectURL(url);
      fileInput.value = "";
    };
    img.src = url;
  });

  downloadWakuBtn.addEventListener("click", () => {
    // 実ファイル名は候補から見つかったやつを使うのが理想だが、
    // ここは「まず候補順でfetchして成功したらDL」方式にする
    (async () => {
      for(const name of WAKU_CANDIDATES){
        try{
          const r = await fetch(name, {cache:"no-store"});
          if(!r.ok) continue;
          const b = await r.blob();
          downloadBlob(b, "waku1.png");
          return;
        }catch{}
      }
      showToast("waku1.PNG が見つかりません（同じ階層に置いてね）", 3800);
    })();
  });

  backBtn.addEventListener("click", () => {
    baseImg = null;
    stamps = [];
    cancelHold();
    fileInput.value = "";
    setView("home");
  });

  resetBtn.addEventListener("click", () => {
    stamps = [];
    cancelHold();
    showToast("スタンプ消去");
  });

  downloadBtn.addEventListener("click", () => {
    if(!baseImg){ showToast("画像がありません"); return; }
    // canvasは常に「背景 + スタンプ + waku」を描画しているので、そのまま保存でOK
    canvas.toBlob((blob) => {
      if(!blob){ showToast("保存に失敗"); return; }
      downloadBlob(blob, "stamped.png");
    }, "image/png");
  });

  // ===== start =====
  (async () => {
    await initAssets();
    setView("home");
    requestAnimationFrame(loop);
  })();
})();
</script>
</body>
</html>
